<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Charge Calculator — Overcharged.uk</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    background: #0d2b28;
    color: #ffffff;
    padding: 2rem;
    min-height: 100vh;
  }

  h2 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 0.5rem;
    letter-spacing: -0.3px;
  }

  .subtitle {
    font-size: 14px;
    color: #7aada0;
    margin-bottom: 2rem;
    line-height: 1.5;
  }

  .field {
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 13px;
    color: #9abfb8;
    margin-bottom: 6px;
    letter-spacing: 0.2px;
  }

  select, input[type="number"], input[type="email"] {
    width: 100%;
    padding: 12px 14px;
    background: #163d38;
    border: 1px solid #2a5a52;
    border-radius: 8px;
    color: #ffffff;
    font-size: 15px;
    appearance: none;
    -webkit-appearance: none;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus, input:focus {
    border-color: #3ecf96;
  }

  input::placeholder {
    color: #4a7a70;
  }

  /* Style the select arrow */
  .select-wrapper {
    position: relative;
  }

  .select-wrapper::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #3ecf96;
    pointer-events: none;
    font-size: 14px;
  }

  select option {
    background: #163d38;
    color: #ffffff;
  }

  .amenities-label {
    font-size: 13px;
    color: #9abfb8;
    margin-bottom: 10px;
    display: block;
  }

  .amenities-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .amenity-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #163d38;
    border: 1px solid #2a5a52;
    border-radius: 8px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
  }

  .amenity-toggle.active {
    border-color: #3ecf96;
    background: #1a4a42;
  }

  .amenity-toggle input {
    display: none;
  }

  .toggle-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid #2a5a52;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 11px;
  }

  .amenity-toggle.active .toggle-icon {
    background: #3ecf96;
    border-color: #3ecf96;
    color: #0d2b28;
    font-weight: 700;
  }

  .amenity-name {
    font-size: 14px;
    color: #ffffff;
  }

  .divider {
    border: none;
    border-top: 1px solid #1e4a42;
    margin: 1.5rem 0;
  }

  .submit-btn {
    width: 100%;
    padding: 14px;
    background: #3ecf96;
    color: #0d2b28;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background 0.2s, opacity 0.2s;
    letter-spacing: -0.2px;
  }

  .submit-btn:hover { background: #34b882; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Result panel */
  .result {
    display: none;
    margin-top: 2rem;
    border-radius: 12px;
    overflow: hidden;
  }

  .result.visible { display: block; }

  .result-header {
    padding: 1.75rem 1.5rem;
    text-align: center;
  }

  .result-header.over { background: #3d1a10; border: 1px solid #8b3a1a; border-radius: 12px 12px 0 0; }
  .result-header.fair { background: #163d38; border: 1px solid #2a5a52; border-radius: 12px 12px 0 0; }
  .result-header.under { background: #163d38; border: 1px solid #2a5a52; border-radius: 12px 12px 0 0; }

  .result-label {
    font-size: 12px;
    color: #7aada0;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .result-number {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 1rem;
  }

  .result-number.over { color: #e05c3a; }
  .result-number.fair { color: #3ecf96; }
  .result-number.under { color: #3ecf96; }

  .result-desc {
    font-size: 14px;
    line-height: 1.7;
    color: #9abfb8;
    max-width: 420px;
    margin: 0 auto;
  }

  .result-body {
    background: #163d38;
    border: 1px solid #2a5a52;
    border-top: none;
    border-radius: 0 0 12px 12px;
    padding: 1.5rem;
  }

  .result-breakdown {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .breakdown-item {
    background: #0d2b28;
    border-radius: 8px;
    padding: 12px 14px;
  }

  .breakdown-item .bl {
    font-size: 11px;
    color: #5a8a80;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .breakdown-item .bv {
    font-size: 17px;
    font-weight: 600;
    color: #ffffff;
  }

  .breakdown-item .bv.highlight {
    color: #e05c3a;
  }

  .cta-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: #e05c3a;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: background 0.2s;
    margin-top: 0.75rem;
  }

  .cta-btn:hover { background: #c94e2f; }

  .cta-sub {
    font-size: 12px;
    color: #5a8a80;
    margin-top: 8px;
    text-align: center;
    line-height: 1.5;
  }

  /* Error and loading */
  .error-msg {
    display: none;
    background: #3d1a1a;
    border: 1px solid #8b3a3a;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14px;
    color: #e05c3a;
    margin-top: 1rem;
    line-height: 1.5;
  }

  .error-msg.visible { display: block; }

  .loading {
    display: none;
    text-align: center;
    padding: 1.25rem 0;
    color: #7aada0;
    font-size: 14px;
  }

  .loading.visible { display: flex; align-items: center; justify-content: center; gap: 10px; }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid #2a5a52;
    border-top-color: #3ecf96;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Reset link */
  .reset-link {
    display: block;
    text-align: center;
    margin-top: 1rem;
    font-size: 13px;
    color: #5a8a80;
    cursor: pointer;
    text-decoration: underline;
  }

  .reset-link:hover { color: #7aada0; }

  /* Mobile */
  @media (max-width: 480px) {
    body { padding: 1.25rem; }
    .amenities-grid { grid-template-columns: 1fr; }
    .result-breakdown { grid-template-columns: 1fr; }
    .result-number { font-size: 36px; }
  }
</style>
</head>
<body>

<p class="subtitle">Tell us about your flat and we'll compare your service charge against our database of similar buildings across the UK.</p>

<!-- FORM -->
<div id="formSection">

  <div class="field">
    <label for="location">Where is your property?</label>
    <div class="select-wrapper">
      <select id="location">
        <option value="">Select location</option>
        <option value="London">Inside London</option>
        <option value="Outside London">Outside London</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label for="sqft">Size of your flat (square feet)</label>
    <input type="number" id="sqft" placeholder="e.g. 650" min="100" max="5000"/>
  </div>

  <div class="field">
    <label for="bedrooms">Number of bedrooms</label>
    <div class="select-wrapper">
      <select id="bedrooms">
        <option value="">Select bedrooms</option>
        <option value="1">1 bedroom</option>
        <option value="2">2 bedrooms</option>
        <option value="3">3 bedrooms</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label for="charge">Your annual service charge (£)</label>
    <input type="number" id="charge" placeholder="e.g. 3500" min="0"/>
  </div>

  <hr class="divider"/>

  <span class="amenities-label">Does your building have any of the following?</span>
  <div class="amenities-grid">
    <label class="amenity-toggle" id="toggle-carpark">
      <input type="checkbox" id="carpark"/>
      <span class="toggle-icon">✓</span>
      <span class="amenity-name"> Car park</span>
    </label>
    <label class="amenity-toggle" id="toggle-concierge">
      <input type="checkbox" id="concierge"/>
      <span class="toggle-icon">✓</span>
      <span class="amenity-name"> Concierge</span>
    </label>
    <label class="amenity-toggle" id="toggle-gym">
      <input type="checkbox" id="gym"/>
      <span class="toggle-icon">✓</span>
      <span class="amenity-name"> Gym</span>
    </label>
    <label class="amenity-toggle" id="toggle-cinema">
      <input type="checkbox" id="cinema"/>
      <span class="toggle-icon">✓</span>
      <span class="amenity-name"> Cinema room</span>
    </label>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="calculate()">Calculate my service charge</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Checking against our database…
  </div>

  <div class="error-msg" id="error"></div>

</div>

<!-- RESULT PANEL -->
<div class="result" id="result">

  <div class="result-header" id="resultHeader">
    <div class="result-label">You are paying approximately</div>
    <div class="result-number" id="resultNumber"></div>
    <div class="result-desc" id="resultDesc"></div>
  </div>

  <div class="result-body">
    <div class="result-breakdown">
      <div class="breakdown-item">
        <div class="bl">Your cost per sq ft</div>
        <div class="bv highlight" id="userCost"></div>
      </div>
      <div class="breakdown-item">
        <div class="bl">Benchmark for your building</div>
        <div class="bv" id="benchmark"></div>
      </div>
    </div>

    <span class="reset-link" onclick="resetForm()">← Start again</span>
  </div>

</div>

<script>

  // ─── REPLACE THIS WITH YOUR MAKE WEBHOOK URL ───
  const WEBHOOK_URL = 'https://hook.eu1.make.com/p9mrqp1bcbg4t0g76fhzxq8qb9mp8tdi';
  // ──────────────────────────────────────────────

  // Store result data for email submission
  let resultData = {};

  // Amenity toggle behaviour
  ['carpark', 'concierge', 'gym', 'cinema'].forEach(id => {
    const toggle = document.getElementById('toggle-' + id);
    const checkbox = document.getElementById(id);
    toggle.addEventListener('click', function(e) {
      e.preventDefault();
      checkbox.checked = !checkbox.checked;
      toggle.classList.toggle('active', checkbox.checked);
    });
  });

  async function calculate() {

    // Clear previous errors
    hideError();

    // Get values
    const location = document.getElementById('location').value;
    const sqft = parseFloat(document.getElementById('sqft').value);
    const bedrooms = document.getElementById('bedrooms').value;
    const charge = parseFloat(document.getElementById('charge').value);

    // Validate
    if (!location) { showError('Please select your location.'); return; }
    if (!bedrooms) { showError('Please select the number of bedrooms.'); return; }
    if (!sqft || isNaN(sqft)) { showError('Please enter the size of your flat in square feet.'); return; }
    if (sqft < 100 || sqft > 5000) { showError('Please enter a realistic flat size between 100 and 5,000 sq ft.'); return; }
    if (!charge || isNaN(charge)) { showError('Please enter your annual service charge amount.'); return; }
    if (charge < 200 || charge > 50000) { showError('Please enter a realistic annual service charge amount.'); return; }

    // Build payload
    const payload = {
      location: location,
      sq_ft: sqft,
      bedrooms: bedrooms,
      annual_charge: charge,
      car_park: document.getElementById('carpark').checked ? 'Yes' : 'No',
      concierge: document.getElementById('concierge').checked ? 'Yes' : 'No',
      gym: document.getElementById('gym').checked ? 'Yes' : 'No',
      cinema: document.getElementById('cinema').checked ? 'Yes' : 'No'
    };

    // Show loading state
    document.getElementById('loading').classList.add('visible');
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('result').classList.remove('visible');

    try {
      const response = await fetch('https://hook.eu1.make.com/p9mrqp1bcbg4t0g76fhzxq8qb9mp8tdi', {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        throw new Error('Server returned ' + response.status);
      }

      const data = await response.json();

      if (data.status === 'success') {
        // Calculate everything in the browser
        const userCostPerSqft = charge / sqft;
        const bench = parseFloat(data.benchmark);

        if (isNaN(bench) || bench === 0) {
          showError('We could not find a benchmark for this building type. Please contact us directly for a manual assessment.');
          return;
        }

        const overpaymentPct = ((userCostPerSqft - bench) / bench) * 100;

        // Store for email submission
        resultData = {
          location, sqft, bedrooms, charge,
          car_park: payload.car_park,
          concierge: payload.concierge,
          gym: payload.gym,
          cinema: payload.cinema,
          user_cost_per_sqft: userCostPerSqft.toFixed(2),
          benchmark: bench,
          overpayment_percent: overpaymentPct.toFixed(1)
        };

        showResult(userCostPerSqft, bench, overpaymentPct, charge);

      } else {
        showError('We could not find a benchmark for this building type. Please contact us directly for a manual assessment.');
      }

    } catch (err) {
      console.error('Calculator error:', err);
      showError('Something went wrong connecting to our database. Please try again in a moment, or contact us directly at projects@overcharged.uk');
    } finally {
      document.getElementById('loading').classList.remove('visible');
      document.getElementById('submitBtn').disabled = false;
    }
  }

  function showResult(userCost, bench, pct, charge) {

    const numberEl = document.getElementById('resultNumber');
    const descEl = document.getElementById('resultDesc');
    const headerEl = document.getElementById('resultHeader');

    const roundedPct = Math.round(Math.abs(pct));

    if (pct > 10) {
      numberEl.textContent = '+' + Math.round(pct) + '% above benchmark';
      numberEl.className = 'result-number over';
      headerEl.className = 'result-header over';
      descEl.textContent = 'Your service charge is significantly above what we would expect for a building like yours. This strongly suggests there are costs worth challenging. A full audit will identify exactly where the excess lies.';
    } else if (pct > 5) {
      numberEl.textContent = '+' + Math.round(pct) + '% above benchmark';
      numberEl.className = 'result-number over';
      headerEl.className = 'result-header over';
      descEl.textContent = 'Your service charge appears to be above the typical range for a building like yours. This warrants a closer look. A full audit will tell you exactly what is driving the difference.';
    } else if (pct < -5) {
      numberEl.textContent = Math.round(pct) + '% below benchmark';
      numberEl.className = 'result-number fair';
      headerEl.className = 'result-header fair';
      descEl.textContent = 'Your service charge appears to be within or below the expected range for a building like yours. That said, a low overall charge does not mean every line item is justified — a full audit gives you complete certainty.';
    } else {
      numberEl.textContent = 'Within benchmark range';
      numberEl.className = 'result-number fair';
      headerEl.className = 'result-header fair';
      descEl.textContent = 'Your service charge appears broadly in line with what we would expect for a building like yours. A full audit will confirm whether all charges are properly evidenced and recoverable under your lease.';
    }

    document.getElementById('userCost').textContent = '£' + userCost.toFixed(2) + ' / sq ft';
    document.getElementById('benchmark').textContent = '£' + bench.toFixed(2);

    document.getElementById('result').classList.add('visible');
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function resetForm() {
    document.getElementById('result').classList.remove('visible');
    document.getElementById('location').value = '';
    document.getElementById('sqft').value = '';
    document.getElementById('bedrooms').value = '';
    document.getElementById('charge').value = '';
    document.getElementById('email').value = '';
    ['carpark', 'concierge', 'gym', 'cinema'].forEach(id => {
      document.getElementById(id).checked = false;
      document.getElementById('toggle-' + id).classList.remove('active');
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideError() {
    document.getElementById('error').classList.remove('visible');
  }

</script>

</body>
</html>
